# Nginx 站点配置：TMS 项目
# 监听 8080 端口（避开系统 80/443），走 IP 访问 http://8.215.32.251:8080
# 未来有域名后：把 server_name 改成域名 + 加 443 SSL block
#
# 部署位置：/etc/nginx/sites-available/automotive
# 启用：ln -s /etc/nginx/sites-available/automotive /etc/nginx/sites-enabled/automotive
# reload：nginx -t && systemctl reload nginx

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # 文件上传体积上限 (照片存证)
    client_max_body_size 20m;

    access_log /var/www/automotive_alms/logs/nginx-access.log;
    error_log  /var/www/automotive_alms/logs/nginx-error.log;

    # 后端 API：所有以 /api 开头的路径转发到 3081 (剥掉 /api 前缀)
    # 前端 apiClient 请求 /api/xxx → 这里转成 http://127.0.0.1:3081/xxx
    location /api/ {
        proxy_pass http://127.0.0.1:3081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (tracking gateway)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # WebSocket 独立路径 (socket.io / tracking gateway)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3081/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # 前端 Next.js SSR：所有其他请求打到 3080
    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
